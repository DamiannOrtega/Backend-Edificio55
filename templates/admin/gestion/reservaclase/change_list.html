{% extends "admin/change_list.html" %}
{% load i18n static %}

{% block search %}
{{ block.super }}

{# ── Date picker encima de la tabla de reservas ── #}
{% with current=request.GET.fecha_exacta|default:'' %}
<div class="row mb-3 px-3" id="fecha-filter-row">
    <div class="col-12">
        <div class="card" style="margin-bottom:0;border:1px solid #dee2e6;">
            <div class="card-body py-2 px-3 d-flex align-items-center flex-wrap" style="gap:14px;">

                <label class="mb-0 font-weight-bold text-muted" style="font-size:13px;white-space:nowrap;">
                    Filtrar por fecha:
                </label>

                <input type="date" id="fecha-exacta-picker" value="{{ current }}" class="form-control form-control-sm"
                    style="width:auto;min-width:170px;max-width:200px;">

                <button type="button" class="btn btn-sm btn-primary px-3"
                    onclick="aplicarFechaFiltro()">Filtrar</button>

                {% if current %}
                <button type="button" class="btn btn-sm btn-outline-secondary px-3" onclick="quitarFechaFiltro()">✕
                    Quitar filtro</button>

                <span class="badge badge-info py-1 px-2" style="font-size:12px;border-radius:6px;">
                    Mostrando: {{ current }}
                </span>
                {% endif %}

            </div>
        </div>
    </div>
</div>
{% endwith %}

<script>
    (function () {
        function aplicarFechaFiltro() {
            var fecha = document.getElementById('fecha-exacta-picker').value;
            var params = new URLSearchParams(window.location.search);
            if (fecha) { params.set('fecha_exacta', fecha); }
            else { params.delete('fecha_exacta'); }
            params.delete('p');
            window.location.search = params.toString();
        }
        function quitarFechaFiltro() {
            var params = new URLSearchParams(window.location.search);
            params.delete('fecha_exacta');
            params.delete('p');
            window.location.search = params.toString();
        }
        window.aplicarFechaFiltro = aplicarFechaFiltro;
        window.quitarFechaFiltro = quitarFechaFiltro;

        var input = document.getElementById('fecha-exacta-picker');
        if (input) {
            input.addEventListener('keydown', function (e) {
                if (e.key === 'Enter') aplicarFechaFiltro();
            });
        }
    })();
</script>
{% endblock %}
